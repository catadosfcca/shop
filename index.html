<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CATADOS FCCA — Loja Oficial</title>
<link rel="icon" type="image/png" href="images/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ============================================================
       Este arquivo não precisa ser editado para manutenção normal.

       - Para adicionar/editar/remover PRODUTOS -> js/produtos.js
       - Para configurar o Google Forms          -> js/config.js
       - Para mudar cores/estilo                 -> css/style.css
       - O carrinho (botão flutuante + drawer + toast aqui embaixo)
         é controlado inteiramente por js/site.js.

       Veja README.md para o passo a passo completo.
       ============================================================ -->

  <div class="topbar">
    <div class="brand">
      <div class="crest"><img src="images/logo.png" alt="Escudo Catados FCCA"></div>
      <div class="brand-name">Catados <span>FCCA</span></div>
    </div>
    <div class="topbar-tag">Loja Oficial</div>
  </div>

  <section class="hero">
    <div class="hero-crest"><img src="images/logo.png" alt="Escudo oficial Catados Shop"></div>
    <h1>Catados<span class="accent">.</span>Shop</h1>
    <p class="hero-sub">Produtos oficiais do Catados FCCA</p>
    <div class="hero-line"></div>
  </section>

  <main class="catalogo">
    <div class="catalogo-titulo">Coleção atual</div>

    <div class="grid" id="grid-produtos">
      <!-- Os cards de produto são gerados automaticamente a partir de
           js/produtos.js — não edite aqui. -->
    </div>
  </main>

  <footer>
    <p><span class="rodape-crest">CATADOS FCCA</span> — Loja Oficial · Pedidos via formulário · © 2026</p>
  </footer>

  <!-- Carrinho: pedido com vários itens, enviado num único link do Forms -->
  <button id="btn-carrinho" class="btn-carrinho-flutuante" type="button" aria-label="Ver pedido">
    <svg class="icone-carrinho" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="9" cy="21" r="1"></circle>
      <circle cx="20" cy="21" r="1"></circle>
      <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
    </svg>
    <span id="carrinho-badge" class="carrinho-badge" hidden>0</span>
  </button>

  <div id="carrinho-overlay" class="carrinho-overlay"></div>
  <aside id="carrinho-drawer" class="carrinho-drawer" aria-label="Seu pedido">
    <div class="carrinho-header">
      <span>Seu pedido</span>
      <button id="btn-fechar-carrinho" type="button" aria-label="Fechar pedido">×</button>
    </div>
    <div id="carrinho-itens" class="carrinho-itens">
      <!-- Preenchido via JS a partir do carrinho salvo no navegador -->
    </div>
    <div class="carrinho-footer">
      <button id="btn-limpar-carrinho" class="btn-limpar" type="button">Limpar pedido</button>
      <button id="btn-finalizar" class="btn btn-finalizar" type="button">Finalizar pedido</button>
    </div>
  </aside>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="js/produtos.js"></script>
  <script src="js/config.js"></script>
  <script src="js/site.js"></script>

</body>
</html>
