<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CATADOS FCCA — Loja Oficial</title>
<link rel="icon" type="image/png" href="images/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ============================================================
       Este arquivo não precisa ser editado para manutenção normal.

       - Para adicionar/editar/remover PRODUTOS -> js/produtos.js
       - Para configurar o Google Forms          -> js/config.js
       - Para mudar cores/estilo                 -> css/style.css

       Veja README.md para o passo a passo completo.
       ============================================================ -->

  <div class="topbar">
    <div class="brand">
      <div class="crest"><img src="images/logo.png" alt="Escudo Catados FCCA"></div>
      <div class="brand-name">Catados <span>FCCA</span></div>
    </div>
    <div class="topbar-tag">Loja Oficial</div>
  </div>

  <section class="hero">
    <div class="hero-crest"><img src="images/logo.png" alt="Escudo oficial Catados Shop"></div>
    <h1>Catados<span class="accent">.</span>Shop</h1>
    <p class="hero-sub">Produtos oficiais do Catados FCCA</p>
    <div class="hero-line"></div>
  </section>

  <main class="catalogo">
    <div class="catalogo-titulo">Coleção atual</div>

    <div class="grid" id="grid-produtos">
      <!-- Os cards de produto são gerados automaticamente a partir de
           js/produtos.js — não edite aqui. -->
    </div>
  </main>

  <footer>
    <p><span class="rodape-crest">CATADOS FCCA</span> — Loja Oficial · Pedidos via formulário · © 2026</p>
  </footer>

  <script src="js/produtos.js"></script>
  <script src="js/config.js"></script>
  <script src="js/site.js"></script>

</body>
</html>
